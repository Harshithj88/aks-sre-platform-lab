name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - prod

permissions:
  id-token: write
  contents: read

env:
  LOCATION: eastus

jobs:
  deploy:
    name: Deploy Infrastructure (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Azure login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Create resource group
      shell: bash
      run: |
        az group create \
          --name rg-aks-sre-platform-${{ github.event.inputs.environment }} \
          --location ${{ env.LOCATION }}

    - name: Validate Bicep template
      uses: azure/arm-deploy@v2
      with:
        scope: resourcegroup
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        resourceGroupName: rg-aks-sre-platform-${{ github.event.inputs.environment }}
        template: ./infra/main.bicep
        parameters: ./infra/parameters/${{ github.event.inputs.environment }}.bicepparam
        deploymentMode: Validate
        deploymentName: validate-${{ github.event.inputs.environment }}-${{ github.run_number }}

    - name: What-If preview
      uses: azure/arm-deploy@v2
      with:
        scope: resourcegroup
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        resourceGroupName: rg-aks-sre-platform-${{ github.event.inputs.environment }}
        template: ./infra/main.bicep
        parameters: ./infra/parameters/${{ github.event.inputs.environment }}.bicepparam
        additionalArguments: --what-if

    - name: Deploy Bicep template
      uses: azure/arm-deploy@v2
      with:
        scope: resourcegroup
        subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        resourceGroupName: rg-aks-sre-platform-${{ github.event.inputs.environment }}
        template: ./infra/main.bicep
        parameters: ./infra/parameters/${{ github.event.inputs.environment }}.bicepparam
        deploymentMode: Incremental
        deploymentName: deploy-${{ github.event.inputs.environment }}-${{ github.run_number }}
