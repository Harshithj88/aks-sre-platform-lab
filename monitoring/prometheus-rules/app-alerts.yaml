apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: app-alerts
  namespace: monitoring
  labels:
    role: alert-rules
spec:
  groups:
    - name: app.health
      rules:
        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total{namespace="demo-api"}[15m]) > 3
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last 15 minutes."

        - alert: PodNotReady
          expr: kube_pod_status_ready{namespace="demo-api", condition="true"} == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is not ready"
            description: "Pod {{ $labels.pod }} has been in a non-ready state for more than 5 minutes."

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="demo-api"}
            !=
            kube_deployment_status_ready_replicas{namespace="demo-api"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} has replica mismatch"
            description: "Expected {{ $value }} replicas but not all are ready."

    - name: app.resources
      rules:
        - alert: HighCPUUsage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{namespace="demo-api"}[5m])) by (pod)
            /
            sum(kube_pod_container_resource_limits{namespace="demo-api", resource="cpu"}) by (pod)
            > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} CPU usage above 85%"
            description: "CPU utilization is {{ $value | humanizePercentage }}."

        - alert: HighMemoryUsage
          expr: |
            sum(container_memory_working_set_bytes{namespace="demo-api"}) by (pod)
            /
            sum(kube_pod_container_resource_limits{namespace="demo-api", resource="memory"}) by (pod)
            > 0.85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} memory usage above 85%"
            description: "Memory utilization is {{ $value | humanizePercentage }}."
